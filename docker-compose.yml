version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: cinelog-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - cinelog-network

  backend:
    build: ./backend
    container_name: cinelog-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/cinelog
      - JWT_SECRET=your_super_secret_key_change_this_in_production
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - cinelog-network

  frontend:
    build: ./frontend
    container_name: cinelog-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - cinelog-network
    depends_on:
      - backend

volumes:
  mongo-data:

networks:
  cinelog-network:
    driver: bridge