
services:
  mongo:
    image: mongo:7
    container_name: cinelog-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - cinelog-network

  backend:
    build: ./backend
    container_name: cinelog-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - cinelog-network

  frontend:
    build: ./frontend
    container_name: cinelog-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - cinelog-network
    depends_on:
      - backend

volumes:
  mongo-data:

networks:
  cinelog-network:
    driver: bridge